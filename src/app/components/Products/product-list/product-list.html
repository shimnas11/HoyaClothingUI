<div class="page">

    <div *ngIf="products().length === 0" class="loading">
        Loading products...
    </div>

    <div *ngIf="products().length > 0" class="table-wrapper">

        <table class="inventory-table">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Color</th>
                    <th>Selling Price</th>
                    <th>Total Qty</th>
                    <th>Available Sizes</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let product of paginatedProducts(); trackBy: trackByCode">

                    <td class="name">{{product.name}}</td>

                    <td>{{product.code}}</td>

                    <td>
                        <span class="color-badge">
                            {{product.color}}
                        </span>
                    </td>

                    <td class="price">
                        ₹{{product.sellingPrice}}
                    </td>

                    <td>
                        <span class="qty-badge">
                            {{product.totalQuantity}}
                        </span>
                    </td>

                    <td>
                        <ng-container *ngFor="let s of product.sizes">
                            <span *ngIf="s.quantity > 0" class="size-badge">
                                {{s.size}}
                            </span>
                        </ng-container>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- ✅ PAGINATION -->
    <div class="pagination" *ngIf="totalPages() > 1">

        <button (click)="prevPage()" [disabled]="currentPage() === 1">
            Prev
        </button>

        <button *ngFor="let page of [].constructor(totalPages()); let i = index" (click)="goToPage(i + 1)"
            [class.active]="currentPage() === i + 1">

            {{i + 1}}

        </button>

        <button (click)="nextPage()" [disabled]="currentPage() === totalPages()">
            Next
        </button>

    </div>

</div>
