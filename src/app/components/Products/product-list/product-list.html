<div class="page">

    <!-- 🔍 SEARCH -->
    <div class="search-box">
        <input type="text" placeholder="Search by name, code, color..." (input)="onSearch($event.target.value)" />
    </div>

    <div *ngIf="products().length === 0" class="loading">
        Loading products...
    </div>

    <div class="orders-card" *ngIf="products().length > 0">
        <div class="order-item" *ngFor="let product of paginatedProducts(); trackBy: trackByCode">
            <div class="left">
                <div class="name">{{ product.code }} - {{ product.name}} </div>
                <div class="items"> <b style="font-weight: bolder">
                        {{product.totalQuantity}}</b>
                    Item(s) </div>
            </div>
            <div class="color-badge">
                {{ product.color }}
            </div>
            <div class="right">
                <div class="amount">₹{{ product.sellingPrice }}</div>
                <div class="time">
                    <ng-container *ngFor="let s of product.sizes">
                        <span *ngIf="s.quantity > 0" class="size-badge">
                            {{s.size}}
                        </span>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>

    <!-- ❌ NO RESULT -->
    <div *ngIf="filteredProducts().length === 0 && products().length > 0" class="no-data">
        No products found
    </div>

    <!-- ✅ PAGINATION -->
    <div class="pagination" *ngIf="totalPages() > 1">

        <button (click)="prevPage()" [disabled]="currentPage() === 1">
            Prev
        </button>

        <button *ngFor="let page of [].constructor(totalPages()); let i = index" (click)="goToPage(i + 1)"
            [class.active]="currentPage() === i + 1">

            {{i + 1}}

        </button>

        <button (click)="nextPage()" [disabled]="currentPage() === totalPages()">
            Next
        </button>

    </div>

</div>
