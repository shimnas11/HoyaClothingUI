<div class="exhibition-page">

    <h2>Create Exhibition</h2>

    <button type="button" class="close-btn" (click)="closeModal()">×</button>

    <form [formGroup]="exhibitionForm" (ngSubmit)="submit()">

        <!-- SEARCH -->

        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" formControlName="name" type="text" placeholder="Enter name" />
            <small class="error" *ngIf="exhibitionForm.get('name')?.touched && exhibitionForm.get('name')?.invalid">
                Name must be at least 3 characters
            </small>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input id="location" formControlName="place" type="text" placeholder="Enter location" />
            <small class="error" *ngIf="exhibitionForm.get('place')?.touched && exhibitionForm.get('place')?.invalid">
                Location must be at least 3 characters
            </small>
        </div>

        <div class="form-group">
            <label for="location">Run by</label>
            <input id="location" formControlName="runBy" type="text" placeholder="Enter Run by" />
            <small class="error" *ngIf="exhibitionForm.get('runBy')?.touched && exhibitionForm.get('runBy')?.invalid">
                Location must be at least 3 characters
            </small>
        </div>

        <div class="form-group">
            <label for="startDate">Start Date</label>
            <input id="startDate" formControlName="startDate" type="date" />
            <small class="error"
                *ngIf="exhibitionForm.get('startDate')?.touched && exhibitionForm.get('startDate')?.invalid">
                Start date is required
            </small>
        </div>

        <div class="form-group">
            <label for="endDate">End Date</label>
            <input id="endDate" formControlName="endDate" type="date" />
            <small class="error"
                *ngIf="exhibitionForm.get('endDate')?.touched && exhibitionForm.get('endDate')?.invalid">
                End date is required
            </small>
        </div>

        <div class="form-group">
            <label for="bookingCost">Booking Cost</label>
            <input id="bookingCost" formControlName="bookingCost" type="number" placeholder="Enter booking cost" />
            <small class="error"
                *ngIf="exhibitionForm.get('bookingCost')?.touched && exhibitionForm.get('bookingCost')?.invalid">
                Booking cost is required
            </small>
        </div>

        <button class="save-btn" type="submit" [disabled]="exhibitionForm.invalid">
            Create Exhibition
        </button>

    </form>
</div>
